name: publish

on:
  workflow_dispatch:
    inputs:
      no-cache:
        description: "Build docker images with no cache"
        default: false
        required: false
        type: boolean
  schedule:
    - cron: '15 21 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check_updates:
    name: Check if fixlang repository has updates
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      current_sha: ${{ steps.check.outputs.current_sha }}
      previous_sha: ${{ steps.check.outputs.previous_sha }}
    steps:
      - name: Get current commit SHA from remote repository
        id: current
        run: |
          CURRENT_SHA=$(curl -s https://api.github.com/repos/tttmmmyyyy/fixlang/branches/main | jq -r '.commit.sha')
          echo "current_sha=${CURRENT_SHA}" >> $GITHUB_OUTPUT
          echo "Current SHA: ${CURRENT_SHA}"

      - name: Download previous build artifact (if exists)
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: fixlang-build-info
          path: ./build-info

      - name: Check if update is needed
        id: check
        run: |
          CURRENT_SHA="${{ steps.current.outputs.current_sha }}"
          
          if [ -f ./build-info/commit-sha ]; then
            PREVIOUS_SHA=$(cat ./build-info/commit-sha)
            echo "previous_sha=${PREVIOUS_SHA}" >> $GITHUB_OUTPUT
          else
            PREVIOUS_SHA="none"
            echo "previous_sha=none" >> $GITHUB_OUTPUT
          fi
          
          if [ "${CURRENT_SHA}" != "${PREVIOUS_SHA}" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Repository has updates. Building..."
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "No updates since last build. Skipping..."
          fi
          
          echo "current_sha=${CURRENT_SHA}" >> $GITHUB_OUTPUT

  push_to_registry:
    name: Push Docker image to Docker Hub
    needs: check_updates
    if: needs.check_updates.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker (fixlang)
        id: meta_fixlang
        uses: docker/metadata-action@v6
        with:
          images: pt9999/fixlang
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Prepare build context (fixlang)
        run: |
          mkdir -p ./fixlang
          echo "${{ needs.check_updates.outputs.current_sha }}" > ./fixlang/commit-sha
          cat ./fixlang/commit-sha

      - name: Build and push Docker image (fixlang)
        uses: docker/build-push-action@v7
        with:
          context: ./fixlang
          file: ./fixlang/Dockerfile
          push: true
          pull: true
          tags: ${{ steps.meta_fixlang.outputs.tags }}
          labels: ${{ steps.meta_fixlang.outputs.labels }}
          cache-from: type=gha,scope=fixlang
          cache-to: type=gha,mode=max,scope=fixlang,ignore-error=true
          no-cache: ${{ inputs.no-cache == true }}

      - name: Extract metadata (tags, labels) for Docker (fixlang_minilib_ci)
        id: meta_fixlang_minilib_ci
        uses: docker/metadata-action@v6
        with:
          images: pt9999/fixlang_minilib_ci
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image (fixlang_minilib_ci)
        uses: docker/build-push-action@v7
        with:
          context: ./fixlang_minilib_ci
          file: ./fixlang_minilib_ci/Dockerfile
          push: true
          pull: true
          tags: ${{ steps.meta_fixlang_minilib_ci.outputs.tags }}
          labels: ${{ steps.meta_fixlang_minilib_ci.outputs.labels }}
          cache-from: type=gha,scope=fixlang_minilib_ci
          cache-to: type=gha,mode=max,scope=fixlang_minilib_ci,ignore-error=true
          no-cache: ${{ inputs.no-cache == true }}

      - name: Save build info for next run
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fixlang-build-info
          path: ./fixlang/commit-sha
          retention-days: 90
